### model
model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
quantization_bit: 4

### dataset
dataset: chnsenticorp_sentiment
template: qwen
cutoff_len: 256
max_samples: 64
overwrite_cache: true
preprocessing_num_workers: 4

### output
output_dir: /mnt/d/home/work/projects/PycharmProjects/domain-tune-lab/checkpoints/qwen2.5-0.5b-chnsenticorp-lora-smoke
logging_steps: 5
save_steps: 20
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
ddp_timeout: 180000000

### eval
val_size: 0.1
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 20
